<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brisa Sensi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#061b06;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.fumaca{
position:absolute;
width:400px;
height:400px;
background:radial-gradient(#00ff66, transparent);
filter:blur(90px);
animation:flutuar 6s infinite alternate;
opacity:0.5;
}

.fumaca2{
right:-100px;
bottom:-100px;
animation-delay:2s;
}

@keyframes flutuar{
from{
transform:translateY(0px);
}
to{
transform:translateY(-40px);
}
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:400px;
background:rgba(0,0,0,0.5);
border:2px solid #00ff66;
border-radius:25px;
padding:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px #00ff66;
}

.logo{
text-align:center;
font-size:38px;
font-weight:bold;
color:#00ff66;
margin-bottom:20px;
text-shadow:0 0 15px #00ff66;
}

input, select{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
background:#0f2d0f;
color:white;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:14px;
background:#00ff66;
color:black;
font-weight:bold;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px #00ff66;
}

.resultado{
margin-top:25px;
background:#081408;
padding:18px;
border-radius:15px;
display:none;
border:1px solid #00ff66;
}

.resultado p{
margin:8px 0;
font-size:17px;
}
</style>
</head>

<body>

<div class="fumaca"></div>
<div class="fumaca fumaca2"></div>

<div class="container">

<div class="logo">BRISA SENSI</div>

<input type="text" id="celular" placeholder="Seu celular">

<select id="fps">
<option>60 FPS</option>
<option>90 FPS</option>
<option>120 FPS</option>
</select>

<select id="estilo">
<option>Subir Capa</option>
<option>Movimentação</option>
<option>Precisão</option>
</select>

<button onclick="gerar()">GERAR SENSI</button>

<div class="resultado" id="resultado">
<p id="geral"></p>
<p id="red"></p>
<p id="x2"></p>
<p id="x4"></p>
<p id="awm"></p>
<p id="botao"></p>
</div>

</div>

<script>

function random(min,max){
return Math.floor(Math.random()*(max-min+1)+min)
}

function gerar(){

let geral = random(85,100)
let red = random(75,95)
let mira2 = random(70,90)
let mira4 = random(60,85)
let awm = random(35,60)
let botao = random(48,70)

document.getElementById("resultado").style.display="block"

document.getElementById("geral").innerHTML =
"🎯 Geral: " + geral

document.getElementById("red").innerHTML =
"🔴 Ponto Vermelho: " + red

document.getElementById("x2").innerHTML =
"🔭 Mira 2x: " + mira2

document.getElementById("x4").innerHTML =
"📡 Mira 4x: " + mira4

document.getElementById("awm").innerHTML =
"💥 AWM: " + awm

document.getElementById("botao").innerHTML =
"🔥 Botão de tiro: " + botao
}

</script>

</body>
</html>
