<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brisa Sense</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* LOGIN */

#login{
height:100vh;
background:url('login.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(0,0,0,0.75);
padding:30px;
border-radius:25px;
width:300px;
backdrop-filter:blur(5px);
border:2px solid #00ff66;
box-shadow:0 0 25px #00ff66;
}

.login-box h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#1b1b1b;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#00ff66;
color:black;
font-size:18px;
font-weight:bold;
margin-top:15px;
}

button:hover{
opacity:0.9;
}

#app{
display:none;
justify-content:center;
align-items:center;
height:100vh;
background:black;
}

.box{
width:320px;
background:#111;
padding:20px;
border-radius:25px;
border:2px solid #00ff66;
box-shadow:0 0 25px #00ff66;
}

.box h1{
text-align:center;
}

.copy{
text-align:center;
color:#00ff66;
margin-bottom:15px;
}

.item{
background:#1b1b1b;
padding:12px;
margin-top:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="login-box">

<h1>BRISA SENSE</h1>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="entrar()">
ENTRAR
</button>

</div>

</div>

<!-- APP -->

<div id="app">

<div class="box">

<h1>BRISA SENSE</h1>

<div class="copy">
✨ Sensi inteligente
</div>

<input type="number" id="dpi" placeholder="Digite sua DPI">

<input type="text" id="tela" placeholder="Polegadas da Tela">

<input type="text" id="modelo" placeholder="Modelo do Celular">

<button onclick="gerar()">
GERAR SENSI 🔥
</button>

<div class="item">
<span>Geral</span>
<span id="geral">---</span>
</div>

<div class="item">
<span>Ponto Vermelho</span>
<span id="red">---</span>
</div>

<div class="item">
<span>Mira 2x</span>
<span id="x2">---</span>
</div>

<div class="item">
<span>Mira 4x</span>
<span id="x4">---</span>
</div>

<div class="item">
<span>AWM</span>
<span id="awm">---</span>
</div>

<div class="item">
<span>Botão</span>
<span id="botao">---</span>
</div>

</div>

</div>

<script>

function entrar(){

let usuario =
document.getElementById('usuario').value

let senha =
document.getElementById('senha').value

if(usuario == "brisa" && senha == "123"){

document.getElementById('login').style.display = "none"

document.getElementById('app').style.display = "flex"

}else{

alert("Usuário ou senha incorretos")

}

}

function gerar(){

let dpi =
parseInt(document.getElementById('dpi').value)

let tela =
parseFloat(document.getElementById('tela').value)

let modelo =
document.getElementById('modelo').value.toLowerCase()

if(!dpi || !tela || !modelo){

alert("Preencha tudo")

return

}

let ajusteModelo = 0

if(
modelo.includes("poco") ||
modelo.includes("iphone") ||
modelo.includes("samsung")
){

ajusteModelo = 15

}else if(
modelo.includes("tecno") ||
modelo.includes("redmi")
){

ajusteModelo = 8

}else{

ajusteModelo = 5

}

let ajusteTela = 0

if(tela >= 6.9){

ajusteTela = -12

}else if(tela >= 6.7){

ajusteTela = -10

}else if(tela >= 6.5){

ajusteTela = -5

}else{

ajusteTela = 5

}

let geral =
Math.floor((dpi * 0.32) + ajusteModelo + ajusteTela)

let red =
Math.floor((dpi * 0.30) + ajusteModelo)

let x2 =
Math.floor((dpi * 0.26) + ajusteTela)

let x4 =
Math.floor((dpi * 0.22) + ajusteTela)

let awm =
Math.floor((dpi * 0.12) + ajusteModelo)

if(geral > 200) geral = 200
if(red > 200) red = 200
if(x2 > 200) x2 = 200
if(x4 > 200) x4 = 200
if(awm > 100) awm = 100

/* BOTÃO AUTOMÁTICO */

let tamanhoBotao = 70

if(tela >= 6.9){

tamanhoBotao = 48

}else if(tela >= 6.7){

tamanhoBotao = 55

}else if(tela >= 6.5){

tamanhoBotao = 60

}else if(tela >= 6.3){

tamanhoBotao = 65

}else{

tamanhoBotao = 72

}

/* RESULTADOS */

document.getElementById('geral').innerHTML = geral

document.getElementById('red').innerHTML = red

document.getElementById('x2').innerHTML = x2

document.getElementById('x4').innerHTML = x4

document.getElementById('awm').innerHTML = awm

document.getElementById('botao').innerHTML =
tamanhoBotao + '%'

}

</script>

</body>
</html>
